<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title{font-family:Arial,Helvetica,sans-serif;font-size:38px;font-weight:700;fill:#ffffff}
      .subtitle{font-family:Arial,Helvetica,sans-serif;font-size:19px;fill:#dce8ff}
      .h{font-family:Arial,Helvetica,sans-serif;font-size:24px;font-weight:700;fill:#13315c}
      .m{font-family:Arial,Helvetica,sans-serif;font-size:18px;fill:#52616b}
      .s{font-family:Arial,Helvetica,sans-serif;font-size:15px;fill:#52616b}
      .metric{font-family:Arial,Helvetica,sans-serif;font-size:25px;font-weight:700}
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2.5}
      .arrow{stroke:#2454a6;stroke-width:6;fill:none;marker-end:url(#arrowhead)}
    </style>
    <marker id="arrowhead" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10" fill="#2454a6"/>
    </marker>
    <radialGradient id="mri" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e8f1fb"/>
      <stop offset="45%" stop-color="#9eb7d4"/>
      <stop offset="75%" stop-color="#44546a"/>
      <stop offset="100%" stop-color="#0b1320"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="#f7f9fc"/>
  <rect x="45" y="35" width="1510" height="95" rx="20" fill="#13315c"/>
  <text x="75" y="80" class="title">Brain Tumor MRI Pipeline 2: Six Single-Filter Viskores Inputs</text>
  <text x="75" y="113" class="subtitle">Raw 2D MRI → six separately filtered MRI representations → combined dataset → ViT-B/16 → 4-class classification</text>

  <rect x="60" y="185" width="235" height="310" rx="18" class="box" stroke="#2454a6"/>
  <text x="178" y="230" text-anchor="middle" class="h">Original 2D</text>
  <text x="178" y="258" text-anchor="middle" class="h">Brain Tumor MRI</text>
  <ellipse cx="178" cy="355" rx="78" ry="105" fill="url(#mri)" stroke="#d9e5f2" stroke-width="4"/>
  <circle cx="220" cy="330" r="26" fill="#f6c9c9" opacity="0.85"/>
  <text x="178" y="470" text-anchor="middle" class="m">7,200 total images</text>

  <path d="M300 340 L385 340" class="arrow"/>

  <rect x="400" y="165" width="520" height="360" rx="18" fill="#f0f6ff" stroke="#b7cdf6" stroke-width="2.5"/>
  <text x="430" y="205" class="h">Apply each single filter separately</text>
  <text x="430" y="232" class="s">Each original MRI produces six filtered images</text>

  <g transform="translate(430,260)">
    <rect width="140" height="95" rx="13" fill="#fff" stroke="#0f8b8d" stroke-width="3"/>
    <ellipse cx="70" cy="40" rx="32" ry="38" fill="#a8d5d6" stroke="#0f8b8d"/>
    <text x="70" y="79" text-anchor="middle" class="m">Median</text>
  </g>
  <g transform="translate(590,260)">
    <rect width="140" height="95" rx="13" fill="#fff" stroke="#2d9cdb" stroke-width="3"/>
    <path d="M40 68 C55 20, 80 70, 102 28" stroke="#2d9cdb" stroke-width="6" fill="none"/>
    <text x="70" y="79" text-anchor="middle" class="m">Sobel</text>
  </g>
  <g transform="translate(750,260)">
    <rect width="140" height="95" rx="13" fill="#fff" stroke="#6a4c93" stroke-width="3"/>
    <path d="M35 30 L105 65 M35 65 L105 30" stroke="#6a4c93" stroke-width="6"/>
    <text x="70" y="79" text-anchor="middle" class="m">Laplacian</text>
  </g>
  <g transform="translate(430,375)">
    <rect width="140" height="95" rx="13" fill="#fff" stroke="#f28c28" stroke-width="3"/>
    <circle cx="45" cy="38" r="6" fill="#f28c28"/><circle cx="72" cy="48" r="5" fill="#f28c28"/><circle cx="96" cy="31" r="7" fill="#f28c28"/><circle cx="58" cy="61" r="4" fill="#f28c28"/>
    <text x="70" y="79" text-anchor="middle" class="m">Texture</text>
  </g>
  <g transform="translate(590,375)">
    <rect width="140" height="95" rx="13" fill="#fff" stroke="#2e7d32" stroke-width="3"/>
    <rect x="42" y="24" width="55" height="42" rx="8" fill="#2e7d32" opacity="0.8"/>
    <text x="70" y="79" text-anchor="middle" class="m">Otsu</text>
  </g>
  <g transform="translate(750,375)">
    <rect width="140" height="95" rx="13" fill="#fff" stroke="#b23a48" stroke-width="3"/>
    <circle cx="58" cy="42" r="24" fill="#b23a48" opacity="0.55"/><circle cx="82" cy="42" r="24" fill="#b23a48" opacity="0.55"/>
    <text x="70" y="79" text-anchor="middle" class="m">Morphology</text>
  </g>

  <path d="M925 340 L1010 340" class="arrow"/>

  <rect x="1030" y="200" width="250" height="285" rx="18" class="box" stroke="#0f8b8d"/>
  <text x="1155" y="245" text-anchor="middle" class="h">Combined</text>
  <text x="1155" y="275" text-anchor="middle" class="h">Filtered-Image</text>
  <text x="1155" y="305" text-anchor="middle" class="h">Dataset</text>
  <rect x="1070" y="333" width="170" height="65" rx="12" fill="#e6f6f6" stroke="#0f8b8d" stroke-width="2.5"/>
  <text x="1155" y="374" text-anchor="middle" class="metric" fill="#0f8b8d">43,200 images</text>
  <text x="1070" y="430" class="m">Training: 33,600</text>
  <text x="1070" y="460" class="m">Testing: 9,600</text>

  <path d="M1285 340 L1370 340" class="arrow"/>

  <rect x="1390" y="215" width="165" height="250" rx="18" class="box" stroke="#6a4c93"/>
  <text x="1472" y="265" text-anchor="middle" class="h" fill="#6a4c93">ViT-B/16</text>
  <g transform="translate(1430,300)">
    <rect width="84" height="84" fill="#f2eafa" stroke="#9b83bd"/>
    <path d="M0 21 H84 M0 42 H84 M0 63 H84 M21 0 V84 M42 0 V84 M63 0 V84" stroke="#9b83bd"/>
  </g>
  <text x="1472" y="415" text-anchor="middle" class="s">Patch embeddings</text>
  <text x="1472" y="438" text-anchor="middle" class="s">+ self-attention</text>

  <rect x="60" y="590" width="1495" height="250" rx="18" class="box"/>
  <text x="95" y="630" class="h">Final Pipeline 2 Result</text>
  <text x="95" y="660" class="m">All six single-filter MRI representations were combined and used as one ViT input dataset.</text>

  <g transform="translate(95,700)">
    <rect width="220" height="95" rx="14" fill="#f8fbff" stroke="#2454a6" stroke-width="3"/>
    <text x="18" y="34" class="m">Accuracy</text><text x="18" y="72" class="metric" fill="#2454a6">93.61%</text>
  </g>
  <g transform="translate(345,700)">
    <rect width="220" height="95" rx="14" fill="#f8fbff" stroke="#0f8b8d" stroke-width="3"/>
    <text x="18" y="34" class="m">Weighted F1</text><text x="18" y="72" class="metric" fill="#0f8b8d">93.45%</text>
  </g>
  <g transform="translate(595,700)">
    <rect width="220" height="95" rx="14" fill="#f8fbff" stroke="#6a4c93" stroke-width="3"/>
    <text x="18" y="34" class="m">Macro AUC</text><text x="18" y="72" class="metric" fill="#6a4c93">0.9716</text>
  </g>
  <g transform="translate(845,700)">
    <rect width="260" height="95" rx="14" fill="#f8fbff" stroke="#2e7d32" stroke-width="3"/>
    <text x="18" y="34" class="m">Gain vs Pipeline 1</text><text x="18" y="72" class="metric" fill="#2e7d32">+1.67 pp</text>
  </g>

  <text x="60" y="875" class="m" fill="#13315c">Pipeline 1 baseline: Raw MRI → ViT = 91.94% accuracy | Pipeline 2: six single-filter MRI inputs → ViT = 93.61% accuracy</text>
</svg>
